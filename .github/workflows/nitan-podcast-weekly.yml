# Weekly automation for the Nitan Podcast show repo.
#
# CastForge owns scheduling and orchestration. The public publishing artifacts
# remain in the nitan-podcast repo so feed URLs and episode URLs stay stable.

name: nitan-podcast-weekly

on:
  schedule:
    - cron: "0 14 * * 1"   # Monday  6 AM PST / 2 PM UTC
    - cron: "0 20 * * 1"   # Monday 12 PM PST / 8 PM UTC
    - cron: "0 2 * * 2"    # Monday  6 PM PST / Tue 2 AM UTC
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip NotebookLM audio generation"
        type: boolean
        default: false
      audio_url:
        description: "Override audio URL (skip NotebookLM, use this URL)"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  nitan-podcast:
    runs-on: [self-hosted, macos]
    env:
      SHOW_REPO: lifan-builds/nitan-podcast
      SHOW_DIR: instances/nitan-podcast
      PY: .venv/bin/python
    steps:
      - name: Checkout CastForge
        uses: actions/checkout@v4

      - name: Checkout show repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SHOW_REPO }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ env.SHOW_DIR }}

      - name: Load show .env from host
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          DOTENV="$HOME/.nitan-podcast/.env"
          if [ -f "$DOTENV" ]; then
            cp "$DOTENV" .env
            echo "::notice::Loaded .env from $DOTENV"
          else
            echo "::error::.env not found at $DOTENV"
            exit 1
          fi

      - name: Compute ISO week
        id: week
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          ISO_WEEK=$(date +%G-W%V)
          echo "iso_week=$ISO_WEEK" >> $GITHUB_OUTPUT
          echo "tag=v${ISO_WEEK}" >> $GITHUB_OUTPUT

      - name: Check if already published this week
        id: check
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          TAG="${{ steps.week.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ env.SHOW_REPO }}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Episode $TAG already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup show venv and install dependencies
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          if [ ! -x .venv/bin/python ]; then
            python3 -m venv .venv
          fi
          $PY -m pip install -q -e "$GITHUB_WORKSPACE"
          $PY -m pip install -q -r requirements.txt
          if [ -f requirements-integrations.txt ]; then
            $PY -m pip install -q -r requirements-integrations.txt
          fi

      - name: Extract and export Markdown
        if: steps.check.outputs.skip != 'true'
        id: export
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          MD_FILE="exports/weekly_meika_${{ steps.week.outputs.iso_week }}.md"
          FLAGS="--dated --log-level INFO"
          if ! rg -n '^GEMINI_API_KEY=.+' .env >/dev/null 2>&1; then
            FLAGS="$FLAGS --skip-briefing"
          fi
          $PY run_pipeline.py $FLAGS
          echo "md_path=$MD_FILE" >> $GITHUB_OUTPUT

      - name: Generate audio
        if: >-
          steps.check.outputs.skip != 'true'
          && inputs.skip_audio != true
          && inputs.audio_url == ''
        id: audio
        continue-on-error: true
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          MP3="releases/weekly_meika_${{ steps.week.outputs.iso_week }}.mp3"
          $PY run_pipeline.py --markdown-input "${{ steps.export.outputs.md_path }}" \
            --publish-notebooklm --notebooklm-audio-out "$MP3" --log-level INFO
          echo "mp3_path=$MP3" >> $GITHUB_OUTPUT
          echo "has_audio=true" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Pages artifact
        if: >-
          steps.check.outputs.skip != 'true'
          && (steps.audio.outputs.has_audio == 'true' || inputs.audio_url != '')
        id: release
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          TAG="${{ steps.week.outputs.tag }}"
          ISO_WEEK="${{ steps.week.outputs.iso_week }}"
          MP3="${{ steps.audio.outputs.mp3_path }}"
          PAGES_MP3="docs/episodes/weekly_meika_${ISO_WEEK}.mp3"
          PAGES_URL="https://lifan-builds.github.io/nitan-podcast/episodes/weekly_meika_${ISO_WEEK}.mp3"

          if [ -n "${{ inputs.audio_url }}" ]; then
            AUDIO_URL="${{ inputs.audio_url }}"
          elif [ -n "$MP3" ] && [ -f "$MP3" ]; then
            mkdir -p docs/episodes
            cp "$MP3" "$PAGES_MP3"
            AUDIO_URL="$PAGES_URL"
            gh release create "$TAG" "$MP3" \
              --repo "${{ env.SHOW_REPO }}" \
              --title "泥潭播客 · ${ISO_WEEK}" \
              --notes "RSS: https://lifan-builds.github.io/nitan-podcast/feed.xml" \
              >/dev/null 2>&1 || true
          fi
          echo "audio_url=${AUDIO_URL:-}" >> $GITHUB_OUTPUT

      - name: Generate RSS feed and forum post
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          AUDIO_URL="${{ steps.release.outputs.audio_url }}"
          MP3="${{ steps.audio.outputs.mp3_path }}"
          FLAGS="--markdown-input ${{ steps.export.outputs.md_path }} --generate-post --generate-rss --log-level INFO"
          if [ -n "$AUDIO_URL" ]; then
            FLAGS="$FLAGS --audio-url $AUDIO_URL"
          fi
          if [ -n "$MP3" ] && [ -f "$MP3" ]; then
            FLAGS="$FLAGS --mp3-path $MP3"
          fi
          $PY run_pipeline.py $FLAGS

      - name: Commit and push show repo changes
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml docs/episodes/
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish episode ${{ steps.week.outputs.iso_week }}"
            git push
          fi

      - name: Validate live feed
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ env.SHOW_DIR }}
        run: |
          $PY scripts/validate_feed.py --wait-for-deploy 120
